# =====================================================
# Bandwidth Bridge – Docker Compose
# 
# Services:
#   - postgres   : PostgreSQL 15 database
#   - backend    : Node.js Express + Socket.IO API
#   - frontend   : React development server
#
# Usage:
#   docker compose up --build
#   Frontend: http://localhost:3000
#   Backend:  http://localhost:3001
# =====================================================

version: '3.9'

services:

  # =====================================================
  # PostgreSQL Database
  # =====================================================
  postgres:
    image: postgres:15-alpine
    container_name: bb-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: bandwidth_bridge
      POSTGRES_USER: bbuser
      POSTGRES_PASSWORD: bbpassword123
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Auto-run migrations on first start
      - ./database/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bbuser -d bandwidth_bridge"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - bb-network

  # =====================================================
  # Backend API & Signaling Server
  # =====================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bb-backend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 3001
      FRONTEND_URL: http://localhost:3000

      # Database
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: bandwidth_bridge
      DB_USER: bbuser
      DB_PASSWORD: bbpassword123

      # Security — CHANGE IN PRODUCTION!
      JWT_SECRET: bandwidth_bridge_dev_secret_key_change_in_prod_min_256_bits
      JWT_EXPIRY: 24h
      BCRYPT_ROUNDS: 12

      # STUN servers for WebRTC NAT traversal
      STUN_SERVER_1: stun:stun.l.google.com:19302
      STUN_SERVER_2: stun:stun1.l.google.com:19302
      STUN_SERVER_3: stun:stun.stunprotocol.org:3478

    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    networks:
      - bb-network

  # =====================================================
  # React Frontend Dev Server
  # =====================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bb-frontend
    restart: unless-stopped
    environment:
      REACT_APP_API_URL: /api
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - bb-network

# =====================================================
# Volumes & Networks
# =====================================================
volumes:
  postgres_data:
    driver: local

networks:
  bb-network:
    driver: bridge
